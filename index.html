<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Talleres Raros: talleres creativos y música.">
    <title>Talleres Raros</title>
    <link rel="icon" type="image/png" href="images/LOGO_ORIGINALBLANCO.png">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Source+Code+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Elementos del Cursor Personalizado -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div id="cursor-text" class="cursor-text"></div>

    <header id="header">
        <div class="headerlogo">
            <img src="images/header_talleresraros.png" alt="Talleres Raros">
        </div>
        <nav id="nav" aria-label="Menú principal">
            <ul>
                <li><a href="#acerca" class="nav-link"><img src="images/Acerca.png" alt="Acerca"></a></li>
                <li><a href="#talleres" class="nav-link"><img src="images/talleres.png" alt="Talleres"></a></li>
                <li><a href="#convocatorias" class="nav-link"><img src="images/Convocatoria.png" alt="Convocatorias"></a></li>
                <li><a href="#registro" class="nav-link"><img src="images/Subscribete.png" alt="Subscríbete"></a></li>
                <li><a href="#contacto" class="nav-link"><img src="images/Contacto.png" alt="Contacto"></a></li>
            </ul>
        </nav>
        <button id="menu-toggle" aria-label="Abrir menú">☰</button>
    </header>

    <main>
        <section id="home" class="section hero">
            <div class="hero-inner">
                <div class="hero-copy">
                    <div class="hero-art">
                        <h1 class="hero-title"><img src="images/talleresraros.png" alt="Talleres Raros"></h1>
                        <div class="floating-bg" aria-hidden="true">
                            <img src="images/resorte1.png" alt="" class="float-img f1">
                            <img src="images/resorte2.png" alt="" class="float-img f2">
                            <img src="images/resorte4.png" alt="" class="float-img f3">
                        </div>
                    </div>
                    <p>Proyecto de enseñanza musical que crea espacios horizontales fuera de la academia...</p>
                    <div class="hero-notes">
                        <div class="hero-note">online, presencial, gratuito</div>
                        <div class="hero-note">hacer música juntxs</div>
                    </div>
                    <a href="#acerca" class="arrow-down">↓</a>
                </div>
                <div class="hero-collage">
                    <div class="hero-sticker sticker-1"><img src="images/d2.png" alt="" class="gallery-item"></div>
                    <div class="hero-sticker sticker-2"><img src="images/d5.png" alt="" class="gallery-item"></div>
                    <div class="hero-sticker sticker-3"><img src="images/d8.png" alt="" class="gallery-item"></div>
                </div>
            </div>
        </section>

        <!-- Secciones Acerca y Talleres (omito contenido repetido para brevedad) -->
        <section id="acerca" class="section about">...</section>
        
        <section id="registro" class="section registro">
            <h2>SUBSCRÍBETE</h2>
            <form id="subscribe-form">
                <input type="text" name="nombre" placeholder="Nombre" required>
                <input type="email" name="email" placeholder="Correo" required>
                <button type="submit">Quiero enterarme</button>
            </form>
            <p id="success-msg" class="success-msg" style="display:none;">¡Gracias! Te escribiremos pronto.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
